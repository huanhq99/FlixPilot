  <g transform="translate(670 138)">
    <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="800" fill="#1081a1" letter-spacing="6">EMBY OPS COCKPIT</text>
    <text x="0" y="88" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="82" font-weight="900" fill="#08182f">FlixPilot · 视界</text>
    <text x="4" y="146" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#17354d">把 Emby 从“能看”推进到“好运营”</text>
    <text x="4" y="196" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" fill="#496070">求片审批 · 追剧缺集 · 播放风控 · TG Bot · AI Agent · 115 联动</text>
