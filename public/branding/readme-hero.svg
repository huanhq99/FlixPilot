<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" role="img" aria-labelledby="title desc">
  <title id="title">FlixPilot · 视界</title>
  <desc id="desc">Emby 站长的一体化运营面板</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fcff"/>
      <stop offset="0.62" stop-color="#eef8fb"/>
      <stop offset="1" stop-color="#fff7eb"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78d5ef"/>
      <stop offset="1" stop-color="#2b9ec2"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffca64"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b4d63" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="18" y="18" width="1564" height="464" rx="38" fill="url(#bg)" stroke="#d5edf4" stroke-width="2"/>
  <path d="M80 372 C254 284 315 98 520 126 C700 151 724 294 916 286 C1084 279 1150 142 1510 106" fill="none" stroke="#c5edf6" stroke-width="30" stroke-linecap="round" opacity="0.5"/>
