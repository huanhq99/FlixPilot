    <path d="M-206 -72 C-238 -32 -238 95 -206 136" fill="none" stroke="#9de2f3" stroke-width="13" stroke-linecap="round" opacity="0.7"/>
    <path d="M-240 -42 C-260 2 -260 65 -240 108" fill="none" stroke="#c9f2fb" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <circle cx="-132" cy="-102" r="9" fill="url(#amber)"/>
