services:
  flixpilot:
    image: huanhq99/flixpilot:latest
    container_name: flixpilot
    restart: unless-stopped
    ports:
      - "3005:3005"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - TZ=Asia/Shanghai
      - REDIS_URL=redis://redis:6379
      # 可选：设置强密钥（生产环境建议设置，未设置时自动生成到 data/*.txt）
      # - JWT_SECRET=your-jwt-secret
      # - CRON_SECRET=your-cron-secret
      # - MASTER_KEY=your-master-key
      # 配置说明：
      # 所有配置都在 ./data/config.json 文件中管理
      # 包括：TMDB、Emby、MoviePilot、Telegram Bot、Gemini AI 等
      # 详见 ./data/config.example.json 示例文件
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: flixpilot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
