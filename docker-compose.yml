services:
  flixpilot:
    image: huanhq99/flixpilot:latest
    restart: unless-stopped
    ports:
      - "3005:3005"
      - "8091-8095:8091-8095"
      # Emby 反代网关预留端口段。
    volumes:
      - ./data:/app/data
      - ./CloudNAS:/CloudNAS
      # CloudNAS 挂载目录：去重删除联动清理 115 网盘真实文件时需要
      - ./strm:/strm
      # 本地 STRM 文件目录：去重删除本地 STRM 文件时需要
      # - /path/to/emby/config/data:/emby-data:ro
      # Emby 用户数据库目录：导入 Emby 用户时用于保留原 Emby 登录密码校验，只读挂载
    environment:
      - REDIS_URL=redis://redis:6379
      - TZ=Asia/Shanghai
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
