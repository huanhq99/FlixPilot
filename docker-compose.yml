services:
  flixpilot:
    image: huanhq99/flixpilot:latest
    container_name: flixpilot
    restart: unless-stopped
    ports:
      - "3005:3005"
    volumes:
      - ./data:/app/data
      # FlixPilot 面板数据目录
      - ./CloudNAS:/CloudNAS:rslave
      # CloudNAS 挂载目录：去重删除联动清理 115 网盘真实文件时需要
      - ./strm:/strm
      # 本地 STRM 文件目录：去重删除本地 STRM 文件时需要
      - ./emby/config/data:/emby-data:ro
      # Emby 用户数据库目录：导入 Emby 用户时用于保留原 Emby 登录密码校验，只读挂载  
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - TZ=Asia/Shanghai
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: flixpilot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy
      allkeys-lru
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
volumes:
  redis_data: null
networks: {}
